<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>absolute position</title>
    <style>
     
        div {
            border: 2px solid black;    
        }

        .div2{
           position:absolute;
           bottom: 0px;
           right: 0px;
           background-color: brown;

        }


    </style>
    <!-- in absolute the position on div or block is remove -->
</head>
<body>

    <div > i am a div 1</div>

    <div class="div2"> i am a div 2</div>

    <div> i am a div 3</div>
    <br>

    <div> i am a div 4</div>

    
</body>
</html>
