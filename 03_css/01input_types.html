<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> inputs checkbox and radio</title>
    <!-- checkbox is for the  multiple select and radio is for single select-->
</head>
<body>
    <h1> which are the following is programming language</h1>
    <input type="checkbox" name="p1">c
    <input type="checkbox" name="p1">c++
    <input type="checkbox" name="p1">c#
    <input type="checkbox" name="p1">c css

    <h2> your gender</h2>
    <input type="radio" name="p2">male
    <input type="radio" name="p2">female
    <input type="radio" name="p2">other
    
    <h3> college year </h3>
    <select>
        <option>default</option>

        <option>first year</option>
        <option>second year</option>
        <option>third year</option>
        <option>fourth year</option>

    </select>
</body>
</html>
